name: Spring Boot Backend CI — Build & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: "21"
  JAVA_DISTRO: temurin

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD & UNIT TESTS
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:                          # Spin up Postgres for integration tests
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven   # or 'gradle' if using Gradle

      - name: Build and run tests (Maven)
        run: mvn -B verify --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_PROFILES_ACTIVE: test

      # ── Gradle alternative (uncomment if using Gradle) ──
      # - name: Build and run tests (Gradle)
      #   run: ./gradlew test --no-daemon
      #   env:
      #     SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
      #     SPRING_DATASOURCE_USERNAME: testuser
      #     SPRING_DATASOURCE_PASSWORD: testpassword

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. SECRET & CREDENTIAL SCANNING
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret & Credential Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check application properties for plaintext secrets
        run: |
          echo "Checking Spring config files for hardcoded secrets..."
          for file in $(find . -name "application*.properties" -o -name "application*.yml" | grep -v test); do
            echo "Scanning: $file"
            grep -nE "(password|secret|api.?key|token|private.?key)\s*[:=]\s*[^\$\{]" "$file" \
              && echo "::warning::Possible plaintext secret in $file — use environment variables or Vault." \
              || true
          done

      - name: Ensure .env files are gitignored
        run: |
          if find . -name ".env" -not -path "./.git/*" | grep -q .; then
            echo "::error::.env file(s) committed to repository — add them to .gitignore immediately."
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 3. DEPENDENCY VULNERABILITY SCAN (OWASP)
  # ─────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven

      - name: Run OWASP Dependency-Check (Maven)
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsFile=.github/owasp-suppressions.xml \
            --no-transfer-progress
        # ── Gradle alternative ──
        # run: ./gradlew dependencyCheckAnalyze
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}   # Optional but recommended for rate limiting

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: target/dependency-check-report.html
          retention-days: 14

  # ─────────────────────────────────────────────
  # 4. SAST — STATIC APPLICATION SECURITY TESTING
  # ─────────────────────────────────────────────
  sast:
    name: SAST (SpotBugs + Find Security Bugs)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven

      - name: Run SpotBugs with Find Security Bugs plugin
        run: |
          mvn -B compile spotbugs:check \
            -Dspotbugs.plugins=com.h3xstream.findsecbugs:findsecbugs-plugin:LATEST \
            -Dspotbugs.failOnError=true \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=High \
            --no-transfer-progress

      - name: Upload SpotBugs XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 14

      - name: CodeQL Analysis (GitHub Advanced Security)
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: CodeQL Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java

  # ─────────────────────────────────────────────
  # 5. CONTAINER IMAGE SECURITY SCAN
  # ─────────────────────────────────────────────
  container-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: target/

      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"          # Fail on HIGH/CRITICAL CVEs

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run Dockle (Docker best-practices lint)
        run: |
          VERSION=$(curl -s https://api.github.com/repos/goodwithtech/dockle/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -L -o dockle.tar.gz "https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz"
          tar -xzf dockle.tar.gz
          ./dockle --exit-code 1 --exit-level warn app:${{ github.sha }}

  # ─────────────────────────────────────────────
  # 6. API SECURITY BASELINE (OWASP ZAP)
  # ─────────────────────────────────────────────
  api-security:
    name: API Security Baseline Scan (ZAP)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}
          cache: maven

      - name: Start Spring Boot application
        run: |
          mvn -B spring-boot:run \
            -Dspring-boot.run.profiles=test \
            --no-transfer-progress &
          echo "Waiting for app to start..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 3
          done
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.TEST_DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:8080
          rules_file_name: .github/zap-rules.tsv
          cmd_options: "-a"           # Include Ajax spider
          fail_action: true
          allow_issue_writing: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
          retention-days: 14

  # ─────────────────────────────────────────────
  # 7. SUMMARY GATE
  # ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate (All checks must pass)
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - secret-scan
      - dependency-check
      - sast
      - container-scan
      - api-security
    if: always()
    steps:
      - name: Evaluate all job results
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          failed = [job for job, info in data.items() if info['result'] not in ('success', 'skipped')]
          if failed:
              print(f'::error::The following jobs failed: {failed}')
              sys.exit(1)
          print('All CI checks passed!')
          "