name: Flutter Mobile CI — Build & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: "3.22.0"

jobs:
  # ─────────────────────────────────────────────
  # 1. STATIC ANALYSIS & DEPENDENCY AUDIT
  # ─────────────────────────────────────────────
  analyze:
    name: Static Analysis & Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dezole
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify dependency integrity (pubspec.lock)
        run: |
          git diff --exit-code pubspec.lock || \
          (echo "::error::pubspec.lock is out of sync. Run 'flutter pub get' and commit the result." && exit 1)

      - name: Run Flutter Analyzer
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Check for known vulnerable packages (dart pub audit)
        run: dart pub audit
        continue-on-error: false  # Fail on HIGH/CRITICAL vulnerabilities

      - name: Check for outdated dependencies
        run: dart pub outdated --no-color
        continue-on-error: true   # Informational only

  # ─────────────────────────────────────────────
  # 2. SECRET & HARDCODED CREDENTIAL SCANNING
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret & Credential Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for Gitleaks

      - name: Run Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: remove if using free tier

      - name: Scan for hardcoded API keys / sensitive strings
        run: |
          echo "Scanning for common secret patterns..."
          grep -rn \
            -e "api_key\s*=" \
            -e "apikey\s*=" \
            -e "secret\s*=" \
            -e "password\s*=" \
            -e "BEGIN RSA PRIVATE KEY" \
            -e "BEGIN EC PRIVATE KEY" \
            --include="*.dart" \
            --include="*.yaml" \
            --include="*.json" \
            . | grep -v "_test\." | grep -v "example" | grep -v "#" \
            && echo "::warning::Potential secrets found — review output above." \
            || echo "No obvious hardcoded secrets detected."

  # ─────────────────────────────────────────────
  # 3. UNIT & WIDGET TESTS
  # ─────────────────────────────────────────────
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: |
          flutter test \
            --coverage \
            --reporter=github \
            --dart-define=ENV=test

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # 4. ANDROID BUILD (DEBUG + RELEASE VALIDATION)
  # ─────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (debug)
        run: flutter build apk --debug --dart-define=ENV=staging

      - name: Build Android App Bundle (release validation)
        run: flutter build appbundle --release --dart-define=ENV=production
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # 5. IOS BUILD (SIMULATION — NO SIGNING)
  # ─────────────────────────────────────────────
  build-ios:
    name: iOS Build (No-Codesign)
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --dart-define=ENV=staging

  # ─────────────────────────────────────────────
  # 6. MOBILE-SPECIFIC SECURITY CHECKS
  # ─────────────────────────────────────────────
  mobile-security:
    name: Mobile Security Checks
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk

      - name: Install MobSF CLI dependencies
        run: |
          pip install mobsfscan --break-system-packages

      - name: Run MobSF static scan on source
        run: |
          mobsfscan --json -o mobsf-report.json . || true
          python3 -c "
          import json, sys
          with open('mobsf-report.json') as f:
              report = json.load(f)
          errors = report.get('results', {})
          high = [k for k, v in errors.items() if v.get('metadata', {}).get('severity') in ['ERROR', 'HIGH']]
          if high:
              print(f'::error::MobSF found {len(high)} HIGH/CRITICAL issue(s): {high}')
              sys.exit(1)
          print('MobSF scan passed — no HIGH/CRITICAL issues.')
          "

      - name: Upload MobSF report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobsf-security-report
          path: mobsf-report.json
          retention-days: 14

      - name: Check Android Network Security Config
        run: |
          NSC_PATH="android/app/src/main/res/xml/network_security_config.xml"
          if [ -f "$NSC_PATH" ]; then
            echo "Network Security Config found — checking for cleartext traffic..."
            grep -q "cleartextTrafficPermitted=\"true\"" "$NSC_PATH" \
              && echo "::warning::cleartext traffic is permitted. Consider restricting to HTTPS only." \
              || echo "No cleartext traffic permission found."
          else
            echo "::warning::No network_security_config.xml found. Consider adding one for HTTPS enforcement."
          fi

      - name: Verify flutter_secure_storage is used (not shared_preferences for secrets)
        run: |
          if grep -r "shared_preferences" pubspec.yaml; then
            echo "::warning::shared_preferences detected — ensure no sensitive data (tokens, keys) is stored in it."
          fi
          if grep -r "flutter_secure_storage" pubspec.yaml; then
            echo "flutter_secure_storage detected — good practice for sensitive data."
          fi

  # ─────────────────────────────────────────────
  # 7. SUMMARY GATE
  # ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate (All checks must pass)
    runs-on: ubuntu-latest
    needs:
      - analyze
      - secret-scan
      - test
      - build-android
      - build-ios
      - mobile-security
    if: always()
    steps:
      - name: Evaluate all job results
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          failed = [job for job, info in data.items() if info['result'] not in ('success', 'skipped')]
          if failed:
              print(f'::error::The following jobs failed: {failed}')
              sys.exit(1)
          print('All CI checks passed!')
          "