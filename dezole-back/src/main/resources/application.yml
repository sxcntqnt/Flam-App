server:
  port: 8080

spring:
  application:
    name: dezole-back
  
  datasource:
    url: jdbc:postgresql://localhost:5432/dezole
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

application:
  jwt:
    secret-key: dezole-secret-key-for-jwt-token-generation-minimum-256-bits-required-base64-encoded
    expiration-milliseconds: 86400000
